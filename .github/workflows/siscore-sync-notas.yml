name: SISCORE Sync Notas

run-name: SISCORE Notas · ${{ inputs.tracking_id || inputs.triggered_by || inputs.siscore_usuario }}

on:
  workflow_dispatch:
    inputs:
      siscore_usuario:
        description: Usuario do SISCORE com credencial cifrada salva no banco
        required: true
        type: string
      scope:
        description: Escopo solicitado pelo app
        required: false
        default: notas_fiscais
        type: choice
        options:
          - notas_fiscais
      triggered_by:
        description: Usuario que disparou a sincronizacao
        required: false
        type: string
      tracking_id:
        description: Identificador unico da sincronizacao disparada pelo site
        required: true
        type: string

concurrency:
  group: siscore-sync-notas
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run SISCORE notes import
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SISCORE_BASE_URL: ${{ secrets.SISCORE_BASE_URL }}
          SISCORE_EXPORTACAO_URL: ${{ secrets.SISCORE_EXPORTACAO_URL }}
          SISCORE_EXPORTACAO_URL_FARMACOLOGICO: ${{ secrets.SISCORE_EXPORTACAO_URL_FARMACOLOGICO }}
          SISCORE_EXPORTACAO_URL_NOTAS_FISCAIS: ${{ secrets.SISCORE_EXPORTACAO_URL_NOTAS_FISCAIS }}
          SISCORE_CREDENTIALS_KEY: ${{ secrets.SISCORE_CREDENTIALS_KEY }}
          SISCORE_CREDENTIALS_USUARIO: ${{ inputs.siscore_usuario }}
          SISCORE_ESTOQUE_MODO: rpc
          SISCORE_NOTAS_FISCAIS_MODO: rpc
          SISCORE_SYNC_SCOPE: ${{ inputs.scope }}
          SISCORE_SYNC_TRIGGERED_BY: ${{ inputs.triggered_by }}
          SISCORE_SYNC_TRACKING_ID: ${{ inputs.tracking_id }}
          SISCORE_SYNC_JOB_TIPO: notas_fiscais
        run: npm run siscore:import
